name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Get version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(grep '<Version>' ExifEditor.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | tr -d ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Generate PNG from SVG (Linux)
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 Resources/icon.svg -o Resources/icon.png

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.get_version.outputs.VERSION }}

      - name: Create deb package
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/share/ExifEditor
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps
          cp -r bin/Release/net8.0/linux-x64/publish/* deb/usr/share/ExifEditor/
          cp Resources/icon.png deb/usr/share/icons/hicolor/256x256/apps/exifeditor.png
          cp ExifEditor.desktop deb/usr/share/applications/
          chmod +x deb/usr/share/ExifEditor/ExifEditor
          cat > deb/DEBIAN/control << CONTROL
          Package: exifeditor
          Version: ${VERSION}
          Section: graphics
          Priority: optional
          Architecture: amd64
          Depends: libx11-6, libfontconfig1
          Maintainer: Michał Szyma <devszyma@gmail.com>
          Description: ExifEditor - EXIF metadata editor
           The program is used for editing the Description and Artist in images saved in the Exif standard.
          CONTROL
          dpkg-deb --build deb "ExifEditor-${VERSION}-linux-amd64.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            ExifEditor-*-linux-amd64.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = $env:GITHUB_REF.Replace("refs/tags/v", "")
            echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          } else {
            [xml]$csproj = Get-Content ExifEditor.csproj
            $v = $csproj.Project.PropertyGroup.Version
            echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          }

      - name: Generate Icons from SVG (Windows)
        run: |
          # magick is pre-installed on windows-latest runners
          magick -background none Resources/icon.svg -resize 512x512 Resources/icon.png
          magick Resources/icon.png -define icon:auto-resize=256,128,64,48,32,16 Resources/icon.ico

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ steps.get_version.outputs.VERSION }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.get_version.outputs.VERSION }}" setup.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            ExifEditor-*-win-x64-setup.exe

  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Display structure of downloaded files
        run: ls -R all-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            all-artifacts/linux-artifacts/*.deb
            all-artifacts/windows-artifacts/*.exe
